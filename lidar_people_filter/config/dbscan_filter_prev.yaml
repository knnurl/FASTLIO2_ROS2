dbscan_filter_node:
  ros__parameters:
    # NOTE: our FastLIO2 publishes world-frame cloud under /fastlio2/world_cloud
    # (not the standard /cloud_registered used by vanilla FastLIO).
    input_topic:         /fastlio2/world_cloud
    output_topic:        /fastlio2/world_cloud_filtered
    accumulate_frames:   6       # 6 frames = ~600 ms window, better far-range density
    dbscan_eps:          0.25    # lower if false negatives; raise if false positives
    dbscan_min_samples:  5       # lowered from 10 — improves far-range detection
    human_min_height:    1.3
    human_max_height:    2.2
    human_min_footprint: 0.15
    human_max_footprint: 1.0
    human_min_pts:       15
    human_max_pts:       3000
    human_min_aspect:    1.8     # raise to 2.2 if shelves/poles are being removed
    ground_z_min:        0.0     # tightened from -1.5 — removes actual ground returns
    ground_z_max:        3.5
    # ── Temporal hysteresis ────────────────────────────────────────────────────
    # Suppresses a confirmed person zone for persist_frames frames after last
    # detection, eliminating flicker when DBSCAN intermittently misses a frame.
    persist_frames:      10      # frames to hold a zone after last confirmation (~1 s at 10 Hz)
    persist_radius:      0.8     # metres — zone radius around last known centroid
